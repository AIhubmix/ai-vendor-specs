# upstream/openai/stepfun overlay
#
# 阶跃星辰 StepFun,提供 OpenAI-compatible /chat/completions(含 OpenAI 式 image_url 多模态)。
# 另有 OpenAI-Realtime 兼容的语音 WebSocket。基础 shape 复用 openai/official,扩展见下。
#
# 来源核验:platform.stepfun.com/docs(2026-06-03);base 证书 *.stepfun.com
#
# === 请求扩展(非 OpenAI 标准)===
# - enable_thinking          推理模式开关(默认关)
# - reasoning_effort         low | medium | high
#
# === 响应扩展(非 OpenAI 标准)===
# - choices[].message.reasoning_content   思维链

base: avs://openai/official

info:
  title: StepFun (OpenAI-compatible)
  description: |
    阶跃星辰 StepFun(Step 系列,多模态),OpenAI 协议兼容 /chat/completions。
    另提供 OpenAI-Realtime 兼容语音 WebSocket(wss://api.stepfun.com/v1/realtime)。
    扩展 enable_thinking / reasoning_effort / reasoning_content 详见顶部注释。
    权威来源:https://platform.stepfun.com/docs

servers:
  - url: https://api.stepfun.com/v1
    description: StepFun 国内
  - url: https://api.stepfun.ai/v1
    description: StepFun 国际
