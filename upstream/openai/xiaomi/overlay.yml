# upstream/openai/xiaomi overlay
#
# 小米 MiMo 开放平台,提供 OpenAI-compatible /chat/completions。另有 Anthropic 兼容面。
# 基础 shape 复用 openai/official,扩展见下。
#
# 来源核验:platform.xiaomimimo.com/docs/en-US/api/chat/openai-api(2026-06-03)
#          base 证书 *.xiaomimimo.com,DNS 直指 alb.xiaomi.com(小米 ALB)
#
# === 鉴权 ===
# - 接受 Authorization: Bearer $KEY 或 api-key: $KEY 头(二选一)
#
# === 响应扩展(非 OpenAI 标准)===
# - choices[].message.reasoning_content   深度思考模式思维链,多轮 tool 调用须保留

base: avs://openai/official

info:
  title: Xiaomi MiMo (OpenAI-compatible)
  description: |
    小米 MiMo 开放平台,OpenAI 协议兼容 /chat/completions。另有 Anthropic 兼容面。
    鉴权可用 Bearer 或 api-key 头;响应扩展 reasoning_content 详见顶部注释。
    权威来源:https://platform.xiaomimimo.com/docs/en-US/api/chat/openai-api

servers:
  - url: https://api.xiaomimimo.com/v1
    description: Xiaomi MiMo Production (OpenAI-compatible)
