# 百度 千帆 Qianfan / 文心 ERNIE,v2 路由提供 OpenAI-compatible /chat/completions。
# ⚠️ 鉴权用 bce-v3/ALTAK-... 形式的 API key(与旧版 aip.baidubce.com access-token 流不同)。
# 基础 shape 复用 openai/official,扩展见下。
#
# 来源核验:cloud.baidu.com/doc/qianfan/s/Hmh4suq26(2026-06-03);base 证书 O=Beijing Baidu Netcom
#
# === 请求扩展(非 OpenAI 标准)===
# - penalty_score            ERNIE 重复惩罚
# - web_search / enable_citation   联网检索与引用(随模型/版本)
#
# 说明:百度内部确有 OpenAPI-Generator 源(baidubce/sdc 生成产物可证),但官方未公开
# 该规范文件,故走 overlay。

base: avs://openai/official

info:
