  /audio/speech:
    post:
      operationId: createSpeech
      tags:
        - Audio
      x-codeSamples:
        - lang: python
          label: Default
          source: >
            import requests


            url = "https://api.siliconflow.cn/v1/audio/speech"


            payload = {
                "model": "fnlp/MOSS-TTSD-v0.5",
                "input": "你站在桥上看风景，看风景的人在楼上看你。明月装饰了你的窗子，你装饰了别人的梦",
                "voice": "fnlp/MOSS-TTSD-v0.5:alex",
                "response_format": "mp3",
                "stream": True
            }


            headers = {
                "Authorization": "Bearer sk-xx",  # 请替换为您的真实 API Key
                "Content-Type": "application/json"
            }


            response = requests.post(url, json=payload, headers=headers,
            stream=True)


            if response.status_code == 200:
                # 将流式响应写入文件
                with open("output.mp3", "wb") as f:
                    for chunk in response.iter_content(chunk_size=1024):
                        if chunk:
                            f.write(chunk)
                print("音频已成功保存为 output.mp3")
            else:
                print(f"请求失败，状态码: {response.status_code}")
                print(f"错误信息: {response.text}")
        - lang: curl
          label: Default
          source: |
            curl --location 'https://api.siliconflow.cn/v1/audio/speech' \
            --header 'Authorization: Bearer sk-xx' \
            --header 'Content-Type: application/json' \
            --data '{
              "model": "fnlp/MOSS-TTSD-v0.5",
              "input": "你站在桥上看风景，看风景的人在楼上看你。明月装饰了你的窗子，你装饰了别人的梦",
              "voice": "fnlp/MOSS-TTSD-v0.5:alex",
              "response_format": "mp3",
              "stream": true
            }'
        - lang: javaScript
          label: Default
          source: |
            const axios = require('axios');
            const fs = require('fs');
            const url = 'https://api.siliconflow.cn/v1/audio/speech';
            const data = {
                model: "fnlp/MOSS-TTSD-v0.5",
                input: "你站在桥上看风景，看风景的人在楼上看你。明月装饰了你的窗子，你装饰了别人的梦",
                voice: "fnlp/MOSS-TTSD-v0.5:alex",
                response_format: "mp3",
                stream: true
            };

            const config = {
                method: 'post',
                url: url,
                headers: {
                    'Authorization': 'Bearer sk-xx', // 请替换为您的真实 API Key
                    'Content-Type': 'application/json'
                },
                data: data,
                responseType: 'stream' // 重要：设置响应类型为流
            };
            axios(config)
                .then(function (response) {
                    // 将流式数据写入文件
                    const writer = fs.createWriteStream('output.mp3');
                    response.data.pipe(writer);

                    writer.on('finish', () => {
                        console.log('音频已成功保存为 output.mp3');
                    });
                    
                    writer.on('error', (err) => {
                        console.error('写入文件时出错:', err);
                    });
                })
                .catch(function (error) {
                    console.error('请求失败:', error.message);
                    if (error.response) {
                        console.error('状态码:', error.response.status);
                    }
                });
      summary: Create Speech
