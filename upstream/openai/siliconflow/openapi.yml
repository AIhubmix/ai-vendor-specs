      deprecated: false
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: >-
        Use the following format for authentication: [<your api
        key>](https://cloud.siliconflow.cn/account/ak)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: your api key
      description: >-
        Use the following format for authentication: Bearer [<your api
        key>](https://cloud.siliconflow.cn/account/ak)
  responses:
    BadRequest:
      description: BadRequest
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRquestData'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedData'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenData'
    NotFound:
      description: NotFound
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundData'
    RateLimit:
      description: RateLimit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitData'
    Overloaded:
      description: Overloaded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OverloadedtData'
    Timeout:
      description: Timeout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TimeoutData'
  schemas:
    EmbeddingsRequest:
      description: >
        Compatible with two request formats:

        - Classic Embedding: keeps the historical parameter definition

        - VL Embedding: supports mixed text/image input, plus `user` and
        `truncate`


        Note: OpenAPI cannot automatically route schemas based on `model`.
        Choose parameters according to model capabilities.
      anyOf:
        - $ref: '#/components/schemas/EmbeddingsClassicRequest'
        - $ref: '#/components/schemas/EmbeddingsVLRequest'
    EmbeddingsClassicRequest:
      title: EmbeddingsClassicRequest
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: >-
            Corresponding Model Name. To better enhance service quality, we will
            make periodic changes to the models provided by this service,
            including but not limited to model on/offlining and adjustments to
            model service capabilities. We will notify you of such changes
            through appropriate means such as announcements or message pushes
            where feasible.  **For a complete list of available models, please
            check the
            [Models](https://cloud.siliconflow.cn/sft-d29cs9gh3vvc73c59kb0/models?types=embedding)**.
          example: BAAI/bge-large-zh-v1.5
        input:
          description: >
            Input text to embed must be provided as a string or an array of
            tokens. To process multiple inputs in a single request, pass an
            array of strings or an array of token arrays. The input length must
            not exceed the model's maximum token limit and should not be an
            empty string.

            The maximum input tokens for each model are as follows:


            BAAI/bge-large-zh-v1.5, BAAI/bge-large-en-v1.5,
            netease-youdao/bce-embedding-base_v1: 512

            BAAI/bge-m3, Pro/BAAI/bge-m3: 8192

            Qwen/Qwen3-Embedding-8B, Qwen/Qwen3-Embedding-4B,
            Qwen/Qwen3-Embedding-0.6B: 32768
          oneOf:
            - type: string
              title: string
              description: >-
                The string that will be turned into an embedding. the item must
                not exceed the max models tokens limitation.
              example: >-
                Silicon flow embedding online: fast, affordable, and
                high-quality embedding services. come try it out!
            - type: array
              title: array
              description: >
                The array of strings that will be turned into an embedding. The
                array length must not exceed the max size, and the item must not
                exceed the max models tokens limitation.

                Current, the maximum array size is 32 , At the same time every
                item must not exceed 512 tokens for current models.
              minItems: 1
              maxItems: 32
              items:
                type: string
                default: '[''LLM'', ''Embedding'', ''RAG'']'
                example: '[''LLM'', ''Embedding'', ''RAG'']'
        encoding_format:
          description: >
            "The format to return the embeddings in. Can be either `float` or
            [`base64`](https://pypi.org/project/pybase64/). "
          example: float
          default: float
          type: string
          enum:
            - float
            - base64
        dimensions:
          description: >
            The number of dimensions the resulting output embeddings should
            have. Only supported in `Qwen/Qwen3` series.  -
            Qwen/Qwen3-Embedding-8B:
            [64,128,256,512,768,1024,1536,2048,2560,4096] - 
            Qwen/Qwen3-Embedding-4B:[64,128,256,512,768,1024,1536,2048,2560] -
            Qwen/Qwen3-Embedding-0.6B: [64,128,256,512,768,1024]
          type: integer
          example: 1024
    EmbeddingsVLRequest:
      title: EmbeddingsVLRequest
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: >-
            The model name for VL Embedding. support
            models:Qwen/Qwen3-VL-Embedding-8B.
          example: Qwen/Qwen3-VL-Embedding-8B
        input:
          description: >
            Input content to be converted. Supported forms:

            - A single string

            - A content object (text or image)

            - A mixed list (strings/content objects)


            Notes:

            - Text content object format: `{"text":"text to embed"}`

            - Image content object format:
            `{"image":"https://example.com/image.jpg"}` or base64

            - Video content is not supported yet

            - Input length must not exceed the model context limit and cannot be
            empty
          oneOf:
            - type: string
              title: string
              description: 作为 embedding 输入的单条文本。
              example: >-
                Silicon flow embedding online: fast, affordable, and
                high-quality embedding services. come try it out!
            - $ref: '#/components/schemas/EmbeddingTextContent'
            - $ref: '#/components/schemas/EmbeddingImageContent'
            - type: array
              title: array
              description: >-
                A content list where each item can be a string, text object, or
                image object.
              minItems: 1
              maxItems: 32
              items:
                $ref: '#/components/schemas/EmbeddingInputItem'
              example:
                - First text
                - text: Second text
                - image: https://example.com/image.jpg
        encoding_format:
          description: |
            Output encoding format. Available values: `float` or `base64`.
          example: float
          default: float
          type: string
          enum:
            - float
            - base64
        dimensions:
          description: >
            The number of dimensions the resulting output embeddings should
            have. Only supported in `Qwen/Qwen3` series.  -
            Qwen/Qwen3-Embedding-8B:
            [64,128,256,512,768,1024,1536,2048,2560,4096] - 
            Qwen/Qwen3-Embedding-4B:[64,128,256,512,768,1024,1536,2048,2560] -
            Qwen/Qwen3-Embedding-0.6B: [64,128,256,512,768,1024]
          type: integer
          example: 1024
        user:
          type: string
          description: User identifier for request tracing and rate limiting.
          example: user_123
        truncate:
          type: string
          description: >-
            Truncation direction for overlong text. Available values: `left` or
            `right`.
          enum:
            - left
            - right
          example: right
    EmbeddingTextContent:
      type: object
      description: Text content object.
      properties:
        text:
          type: string
          description: Text content to be converted.
          example: The quick brown fox
      required:
        - text
    EmbeddingImageContent:
      type: object
      description: Image content object.
      properties:
        image:
          type: string
          description: Image URL or base64-encoded image content.
          example: https://example.com/image.jpg
      required:
        - image
    EmbeddingInputItem:
      description: A single item in the embedding input list.
      oneOf:
        - type: string
          description: Text string.
          example: First text
        - $ref: '#/components/schemas/EmbeddingTextContent'
        - $ref: '#/components/schemas/EmbeddingImageContent'
    ChatMessagesRequest:
      title: LLM
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: >-
            Corresponding Model Name. To better enhance service quality, we will
            make periodic changes to the models provided by this service,
            including but not limited to model on/offlining and adjustments to
            model service capabilities. We will notify you of such changes
            through appropriate means such as announcements or message pushes
            where feasible.**For a complete list of available models, please
            check the
            [Models](https://cloud.siliconflow.cn/sft-d29cs9gh3vvc73c59kb0/models?types=chat)**.
          example: Pro/zai-org/GLM-4.7
          default: Pro/zai-org/GLM-4.7
        messages:
          type: array
          description: A list of messages comprising the conversation so far.
          items:
            type: object
            properties:
              role:
                type: string
                description: 'The role of the messages author. Choice between: system, user.'
                example: user
                enum:
                  - user
                  - system
                  - assistant
              content:
                oneOf:
                  - type: string
                    description: The contents of the message.
                    example: >-
                      What opportunities and challenges will the Chinese large
                      model industry face in 2025?
            required:
              - role
              - content
          minItems: 1
          maxItems: 10
        system:
          allOf:
            - anyOf:
                - type: string
                - items:
                    $ref: '#/components/schemas/RequestTextBlock'
                  type: array
              description: >-
                System prompt.


                A system prompt is a way of providing context and instructions
                to llm, such as specifying a particular goal or role. 
              title: System
        stop_sequences:
          allOf:
            - description: >-
                Custom text sequences that will cause the model to stop
                generating.


                Our models will normally stop when they have naturally completed
                their turn, which will result in a response `stop_reason` of
                `"end_turn"`.


                If you want the model to stop generating when it encounters
                custom strings of text, you can use the `stop_sequences`
                parameter. If the model encounters one of the custom sequences,
                the response `stop_reason` value will be `"stop_sequence"` and
                the response `stop_sequence` value will contain the matched stop
                sequence.
              items:
                type: string
              title: Stop Sequences
              type: array
        stream:
          type: boolean
          description: >-
            If set, tokens are returned as Server-Sent Events as they are made
            available. Stream terminates with `data: [DONE]`
          example: true
        max_tokens:
          type: integer
          description: >-
            The maximum number of tokens to generate before stopping.


            Note that our models may stop _before_ reaching this maximum. This
            parameter only specifies the absolute maximum number of tokens to
            generate.


            Different models have different maximum values for this parameter. 
            See
            [models](https://docs.siliconflow.cn/cn/userguide/capabilities/text-generation)
            for details.
          example: 8192
        temperature:
          type: number
          description: Determines the degree of randomness in the response.
          format: float
          example: 0.7
          maximum: 2
          minimum: 0
        top_p:
          type: number
          description: >-
            The `top_p` (nucleus) parameter is used to dynamically adjust the
            number of choices for each predicted token based on the cumulative
            probabilities.
          format: float
          example: 0.7
          minimum: 0.1
          maximum: 1
        top_k:
          type: number
          format: float
          example: 50
          minimum: 0
          maximum: 50
        tools:
          type: array
          description: |
            Each tool definition includes:


              * `name`: Name of the tool.

              * `description`: Optional, but strongly-recommended
              description of the tool.

              * `input_schema`: [JSON
              schema](https://json-schema.org/draft/2020-12) for the
              tool `input` shape that the model will produce in
              `tool_use` output content blocks.
          items:
            $ref: '#/components/schemas/MessagesTool'
        tool_choice:
          allOf:
            - description: >-
                How the model should use the provided tools. The model can use a
                specific tool, any available tool, decide by itself, or not use
                tools at all.
              discriminator:
                mapping:
                  auto: '#/components/schemas/ToolChoiceAuto'
                  none: '#/components/schemas/ToolChoiceNone'
                  tool: '#/components/schemas/ToolChoiceTool'
                propertyName: type
              oneOf:
                - $ref: '#/components/schemas/ToolChoiceAuto'
                - $ref: '#/components/schemas/ToolChoiceTool'
                - $ref: '#/components/schemas/ToolChoiceNone'
    RequestTextBlock:
      additionalProperties: false
      properties:
        text:
          minLength: 1
          title: Text
          type: string
        type:
          enum:
            - text
          title: Type
          type: string
      required:
        - text
        - type
      title: Text
      type: object
    ToolChoiceAny:
      additionalProperties: false
      description: The model will use any available tools.
      properties:
        disable_parallel_tool_use:
          description: >-
            Whether to disable parallel tool use.


            Defaults to `false`. If set to `true`, the model will output exactly
            one tool use.
          title: Disable Parallel Tool Use
          type: boolean
        type:
          enum:
            - any
          title: Type
          type: string
      required:
        - type
      title: Any
      type: object
    ToolChoiceAuto:
      additionalProperties: false
      description: The model will automatically decide whether to use tools.
      properties:
        disable_parallel_tool_use:
          description: >-
            Whether to disable parallel tool use.


            Defaults to `false`. If set to `true`, the model will output at most
            one tool use.
          title: Disable Parallel Tool Use
          type: boolean
        type:
          enum:
            - auto
          title: Type
          type: string
      required:
        - type
      title: Auto
      type: object
    ToolChoiceNone:
      additionalProperties: false
      description: The model will not be allowed to use tools.
      properties:
        type:
          enum:
            - none
          title: Type
          type: string
      required:
        - type
      title: None
      type: object
    ToolChoiceTool:
      additionalProperties: false
      description: The model will use the specified tool with `tool_choice.name`.
      properties:
        disable_parallel_tool_use:
          description: >-
            Whether to disable parallel tool use.


            Defaults to `false`. If set to `true`, the model will output exactly
            one tool use.
          title: Disable Parallel Tool Use
          type: boolean
        name:
          description: The name of the tool to use.
          title: Name
          type: string
        type:
          enum:
            - tool
          title: Type
          type: string
      required:
        - name
        - type
      title: Tool
      type: object
    EmbeddingsResponse:
      type: object
      required:
        - object
        - model
        - data
        - usage
      properties:
        object:
          type: string
          description: The object type, which is always "list".
          enum:
            - - list
        model:
          description: The name of the model used to generate the embedding.
          type: string
        data:
          type: array
          description: The list of embeddings generated by the model.
          items:
            type: object
            required:
              - index
              - object
              - embedding
            properties:
              object:
                type: string
                enum:
                  - embedding
              embedding:
                type: array
                items:
                  type: number
              index:
                type: integer
        usage:
          type: object
          description: The usage information for the request.
          properties:
            prompt_tokens:
              type: integer
              description: The number of tokens used by the prompt.
            completion_tokens:
              type: integer
              description: The number of tokens used by the completion.
            total_tokens:
              type: integer
              description: The total number of tokens used by the request.
          required:
            - prompt_tokens
            - total_tokens
            - completion_tokens
    RerankRequest:
      description: >
        Compatible with two request formats:

        - Classic Rerank: text query with text documents

        - Multimodal Rerank: supports image/video content in query and documents


        Note: OpenAPI cannot automatically route schemas based on `model`.
        Choose parameters according to model capabilities.
      anyOf:
        - $ref: '#/components/schemas/RerankClassicRequest'
        - $ref: '#/components/schemas/RerankVLRequest'
    RerankClassicRequest:
      title: RerankClassicRequest
      type: object
      required:
        - model
        - query
        - documents
      properties:
        model:
          type: string
          description: >-
            Corresponding Model Name. To better enhance service quality, we will
            make periodic changes to the models provided by this service,
            including but not limited to model on/offlining and adjustments to
            model service capabilities. We will notify you of such changes
            through appropriate means such as announcements or message pushes
            where feasible.  **For a complete list of available models, please
            check the
            [Models](https://cloud.siliconflow.cn/sft-d29cs9gh3vvc73c59kb0/models?types=rerank)**.
          example: BAAI/bge-reranker-v2-m3
        query:
          type: string
          description: The search query. Length must be ≥ 1.
          example: Apple
          minLength: 1
        documents:
          description: |
            The list of documents to be ranked. Supports the following formats:
            - A single text string
            - An array of text strings
            At least 1 document is required.
          oneOf:
            - type: string
              title: string
              description: A single text document.
              example: apple
            - type: array
              title: array
              description: An array of text strings or content objects.
              minItems: 1
              items:
                $ref: '#/components/schemas/RerankDocumentItem'
              example:
                - apple
                - banana
                - fruit
                - vegetable
        instruction:
          type: string
          description: >-
            The instruction for the reranker. Only supported by
            Qwen/Qwen3-Reranker-8B, Qwen/Qwen3-Reranker-4B,
            Qwen/Qwen3-Reranker-0.6B. Length must be ≥ 1.
          example: Please rerank the documents based on the query.
          minLength: 1
        top_n:
          type: integer
          description: Number of most relevant documents or indices to return. Must be ≥ 1.
          example: 4
          minimum: 1
        return_documents:
          type: boolean
          description: >-
            If false, the response does not include document text; if true, it
            includes the input document text. Default is false.
          default: false
        max_chunks_per_doc:
          type: integer
          description: >-
            Maximum number of chunks generated from within a document. Long
            documents are divided into multiple chunks for calculation, and the
            highest score among the chunks is taken as the document's score.
            Only BAAI/bge-reranker-v2-m3, Pro/BAAI/bge-reranker-v2-m3,
            netease-youdao/bce-reranker-base_v1 support this field. Must be ≥ 1,
            default is 1024.
          default: 1024
          minimum: 1
        overlap_tokens:
          type: integer
          description: >-
            Number of token overlaps between adjacent chunks when documents are
            chunked. Only BAAI/bge-reranker-v2-m3, Pro/BAAI/bge-reranker-v2-m3,
            netease-youdao/bce-reranker-base_v1 support this field. Must be
            between 0 and 80.
          minimum: 0
          maximum: 80
    RerankVLRequest:
      title: RerankVLRequest
      type: object
      required:
        - model
        - query
        - documents
      properties:
        model:
          type: string
          description: >-
            The model name for multimodal reranking. Support models:
            Qwen/Qwen3-VL-Reranker-8B
          example: Qwen/Qwen3-VL-Reranker-8B
        query:
          description: >
            The search query. Supports text string or content object.

            - Text query: a plain string

            - Image query: `{"image": "https://example.com/image.jpg"}` or
            base64


            Length must be ≥ 1.
          oneOf:
            - type: string
              title: string
              description: Text query string.
              example: Apple
              minLength: 1
            - $ref: '#/components/schemas/RerankImageUrlContent'
        documents:
          description: >
            The list of documents to be ranked. Each item can be a text string
            or a content object.

            - Text document: a plain string

            - Text object: `{"text": "document text"}`

            - Image object: `{"image": "https://example.com/image.jpg"}` or
            base64


            At least 1 document is required.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RerankVLDocumentItem'
          example:
            - apple
            - banana
            - fruit
            - vegetable
        instruction:
          type: string
          description: >-
            The instruction for the reranker. Only supported by
            Qwen/Qwen3-Reranker-8B, Qwen/Qwen3-Reranker-4B,
            Qwen/Qwen3-Reranker-0.6B. Length must be ≥ 1.
          example: Please rerank the documents based on the query.
          minLength: 1
        top_n:
          type: integer
          description: Number of most relevant documents or indices to return. Must be ≥ 1.
          example: 4
          minimum: 1
        return_documents:
          type: boolean
          description: >-
            If false, the response does not include document text; if true, it
            includes the input document text. Default is false.
          default: false
        max_chunks_per_doc:
          type: integer
          description: >-
            Maximum number of chunks generated from within a document. Must be ≥
            1, default is 1024.
          default: 1024
          minimum: 1
        overlap_tokens:
          type: integer
          description: >-
            Number of token overlaps between adjacent chunks when documents are
            chunked. Must be between 0 and 80.
          minimum: 0
          maximum: 80
    RerankTextContent:
      type: object
      description: Text content object for reranking.
      properties:
        text:
          type: string
          description: Text content.
          example: The quick brown fox
      required:
        - text
    RerankImageUrlContent:
      type: object
      description: Image content object for reranking.
      properties:
        image:
          type: string
          description: Image URL or base64-encoded image content.
          example: https://example.com/image.jpg
      required:
        - image
    RerankDocumentItem:
      description: A single document item in the rerank input list.
      oneOf:
        - type: string
          description: Text document string.
          example: apple
        - $ref: '#/components/schemas/RerankTextContent'
        - $ref: '#/components/schemas/RerankImageUrlContent'
    RerankVLDocumentItem:
      description: A single document item in the VL rerank input list.
      oneOf:
        - type: string
          description: Text document string.
          example: apple
        - $ref: '#/components/schemas/RerankTextContent'
        - $ref: '#/components/schemas/RerankImageUrlContent'
    RerankResponse:
      type: object
      required:
        - id
        - results
      properties:
        id:
          type: string
          description: Unique identifier for the response.
          example: rerank-20240115-abc123def456
        results:
          type: array
          description: List of reranked results sorted by relevance score.
          items:
            $ref: '#/components/schemas/RerankResult'
        meta:
          $ref: '#/components/schemas/RerankResponseMeta'
    RerankResult:
      type: object
      description: A single rerank result.
      properties:
        index:
          type: integer
          description: The index of the document in the original input list.
          example: 1
        document:
          description: >-
            Original document content. Only returned when
            `return_documents=true`.
          oneOf:
            - $ref: '#/components/schemas/RerankTextDocument'
            - $ref: '#/components/schemas/RerankImageDocument'
        relevance_score:
          type: number
          description: Relevance score (0-1, higher is more relevant).
          example: 0.85
    RerankTextDocument:
      type: object
      description: Text document content in the rerank result.
      properties:
        text:
          type: string
          description: The text content of the document.
          example: 深度学习是机器学习的子集...
    RerankImageDocument:
      type: object
      description: Image document content in the rerank result.
      properties:
        image:
          type: string
          description: >-
            Base64-encoded image data or URL (sensitive information is
            redacted).
    RerankResponseMeta:
      type: object
      description: Metadata about the rerank response.
      properties:
        tokens:
          $ref: '#/components/schemas/RerankResponseMetaTokens'
        billed_units:
          $ref: '#/components/schemas/RerankResponseMetaBilledUnits'
    RerankResponseMetaTokens:
      type: object
      description: Token usage statistics.
      properties:
