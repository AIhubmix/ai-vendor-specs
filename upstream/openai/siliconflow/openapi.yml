          example: 10
        image_tokens:
          type: integer
          description: Number of billed image tokens.
          example: 0
        search_units:
          type: integer
          description: Number of search units.
          example: 1
        classifications:
          type: integer
          description: Number of classification units.
          example: 0
    AudioRequest:
