name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-progress deploy at a time; don't cancel in-progress runs
# so a completed build always finishes its upload.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Forks don't have Pages enabled and would 403; skip silently.
    if: github.repository == 'AIhubmix/ai-vendor-specs'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Rebuild manifest (so site reads the latest upstream/ state)
        run: npm run manifest

      - name: Build site
        run: npm run build-site

      - uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
