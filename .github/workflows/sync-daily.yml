name: Sync Specs Daily

on:
  schedule:
    - cron: '30 11 * * *'  # 每天 UTC 11:30 (北京时间 19:30)
  workflow_dispatch:      # 手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Sync all specs
        run: bash scripts/sync-all.sh

      - name: Validate
        run: bash scripts/validate-all.sh

      - name: Rebuild manifest
        run: npm run manifest

      - name: Check drift (with webhook notification on warn/error)
        env:
          AVS_WEBHOOK_URL: ${{ secrets.AVS_WEBHOOK_URL }}
          AVS_WEBHOOK_TYPE: ${{ secrets.AVS_WEBHOOK_TYPE }}
        run: npm run drift

      - name: Check changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-sync specs $(date +%Y-%m-%d)"
          git push

      # NOTE: Daily sync no longer auto-bumps the package version. Releases are
      # cut explicitly by the maintainer via `git tag v0.x.y && git push --tags`
      # or by running .github/workflows/publish-npm.yml manually.
