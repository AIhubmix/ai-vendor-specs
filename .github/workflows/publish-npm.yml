name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run only (do not actually publish)'
        type: boolean
        default: false

jobs:
  publish:
    # Guard: only the canonical repo publishes. Forks that push a tag get a
    # skipped (green) job rather than wasted minutes ending in a 401 from npm.
    if: github.repository == 'AIhubmix/ai-vendor-specs'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Drift check (sanity)
        run: npm run drift

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run }}
        run: echo "Dry-run mode — no publish performed. See npm pack output above."
