openapi: 3.0.0
info:
  title: Anthropic Claude API
  version: 2023-06-01
  description: Anthropic Claude API Specification
servers:
  - url: https://api.anthropic.com/v1
paths:
  /messages:
    post:
      summary: Create a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
                - max_tokens
              properties:
                model:
                  type: string
                  description: Model ID
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                max_tokens:
                  type: integer
                  description: Maximum tokens (required)
                temperature:
                  type: number
                  minimum: 0
                  maximum: 1
                top_p:
                  type: number
                  minimum: 0
                  maximum: 1
                stream:
                  type: boolean
      responses:
        '200':
          description: Success
